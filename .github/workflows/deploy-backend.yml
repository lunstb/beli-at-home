name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  SERVICE_NAME: beli-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Docker image
        working-directory: backend
        run: docker build -t beli-backend .

      - name: Push to Lightsail
        run: |
          # Install Lightsail plugin
          aws lightsail push-container-image \
            --service-name $SERVICE_NAME \
            --label beli-backend \
            --image beli-backend:latest

      - name: Get pushed image
        id: image
        run: |
          IMAGE=$(aws lightsail get-container-images --service-name $SERVICE_NAME --query 'containerImages[0].image' --output text)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --service-name $SERVICE_NAME \
            --containers '{
              "beli-backend": {
                "image": "${{ steps.image.outputs.image }}",
                "ports": {"3001": "HTTP"},
                "environment": {
                  "NODE_ENV": "production",
                  "PORT": "3001",
                  "GOOGLE_CLIENT_ID": "${{ secrets.GOOGLE_CLIENT_ID }}",
                  "JWT_SECRET": "${{ secrets.JWT_SECRET }}",
                  "FRONTEND_URL": "https://beli.berkelunstad.com",
                  "STORAGE_MODE": "s3",
                  "S3_ENDPOINT": "${{ secrets.S3_ENDPOINT }}",
                  "S3_REGION": "${{ secrets.AWS_REGION }}",
                  "S3_BUCKET": "${{ secrets.S3_BUCKET }}",
                  "S3_ACCESS_KEY": "${{ secrets.S3_ACCESS_KEY }}",
                  "S3_SECRET_KEY": "${{ secrets.S3_SECRET_KEY }}",
                  "DB_BACKUP_BUCKET": "${{ secrets.DB_BACKUP_BUCKET }}"
                }
              }
            }' \
            --public-endpoint '{"containerName": "beli-backend", "containerPort": 3001, "healthCheck": {"path": "/api/health"}}'
